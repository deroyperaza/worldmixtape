<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>WORLD MIXTAPE — every country's local music, decade by decade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Anton&family=Permanent+Marker&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=68" />
<link rel="icon" type="image/png" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />
<meta name="theme-color" content="#c6ff00" />
</head>
<body>
  <!-- film-grain + halftone overlays -->
  <div class="grain" aria-hidden="true"></div>
  <svg class="noise-svg" aria-hidden="true"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#noise)"/></svg>

  <!-- top marquee ticker -->
  <div class="ticker" aria-hidden="true">
    <div class="ticker__track" id="ticker"></div>
  </div>

  <header class="brand">
    <div class="brand__tape">
      <img class="brand__logo" src="logo.png" alt="World Mixtape" />
      <h1 class="brand__title">WORLD<br><span>MIXTAPE</span></h1>
    </div>
    <p class="brand__sub">The world's local music,<br>decade by decade.</p>
  </header>

  <!-- top-right controls: favorites + shuffle -->
  <div class="topctrls">
    <button class="faves-btn" id="faves-btn" aria-label="Favorites"><span class="faves-btn__h" aria-hidden="true">♥</span><i id="fav-count">0</i></button>
    <!-- spin the globe: random tracks, optionally filtered by country / era / genre -->
    <div class="shuffle-wrap" id="shuffle-wrap">
      <button class="shuffle" id="shuffle" aria-label="Shuffle">
        <span class="shuffle__ic" aria-hidden="true">🔀</span><span class="shuffle__tx">shuffle<br><b id="shuffle-scope">the world</b></span>
      </button>
      <button class="shuffle-filt" id="shuffle-filt" aria-label="Filter shuffle" aria-expanded="false">▾</button>
    </div>
  </div>
  <div class="shuffle-pop" id="shuffle-pop" hidden></div>

  <!-- the map = the navigation -->
  <main id="map-wrap" class="map-wrap">
    <svg id="map" role="img" aria-label="World map. Tap a highlighted country to hear its top tracks."></svg>
    <div class="map-hint" id="map-hint">spin · pinch · poke a glowing country</div>
    <div class="clist" id="clist"></div>
  </main>
  <button class="view-toggle" id="view-toggle" aria-label="Toggle list view">☰ all countries</button>

  <!-- hover tooltip -->
  <div class="tip" id="tip" aria-hidden="true"></div>

  <!-- country panel / cassette J-card -->
  <aside class="panel" id="panel" aria-hidden="true">
    <button class="panel__close" id="panel-close" aria-label="Close">✕ close</button>
    <div class="panel__inner" id="panel-inner"></div>
  </aside>
  <div class="scrim" id="scrim" aria-hidden="true"></div>

  <!-- persistent player -->
  <footer class="player" id="player" aria-hidden="true">
    <img class="player__art" id="p-art" alt="" />
    <div class="player__meta">
      <div class="player__title" id="p-title">—</div>
      <div class="player__artist" id="p-artist">press play somewhere</div>
      <div class="player__bar"><i id="p-progress"></i></div>
    </div>
    <button id="p-full" class="player__full" aria-label="Toggle full songs (Spotify)" title="Switch to full songs (Spotify Premium)"><svg viewBox="0 0 168 168" aria-hidden="true"><circle cx="84" cy="84" r="84" fill="currentColor"/><path fill="#0a0916" d="M122.6 121.2c-1.6 2.6-5 3.4-7.6 1.8-20.8-12.7-47-15.6-77.9-8.6-3 .7-6-1.2-6.6-4.2-.7-3 1.2-6 4.2-6.6 33.8-7.7 62.8-4.4 86.1 9.8 2.6 1.6 3.4 5 1.8 7.6zm9.3-20.7c-2 3.2-6.2 4.2-9.4 2.2-23.8-14.6-60-18.9-88.1-10.4-3.6 1.1-7.4-.9-8.5-4.5-1.1-3.6.9-7.4 4.5-8.5 32.1-9.7 72-4.9 99.3 11.9 3.2 2 4.2 6.2 2.2 9.3zm.8-21.5c-28.5-16.9-75.6-18.5-102.8-10.2-4.3 1.3-8.9-1.1-10.2-5.4-1.3-4.3 1.1-8.9 5.4-10.2 31.2-9.5 83.2-7.6 116 11.9 3.9 2.3 5.1 7.3 2.8 11.2-2.3 3.9-7.3 5.2-11.2 2.9z"/></svg></button>
    <button id="p-fav" class="player__fav" aria-label="Save to favorites">♥</button>
    <div class="player__ctrls">
      <button id="p-prev" aria-label="Previous">⏮</button>
      <button id="p-play" class="is-big" aria-label="Play/Pause">▶</button>
      <button id="p-next" aria-label="Next">⏭</button>
    </div>
  </footer>

  <!-- album art lightbox -->
  <div class="art-modal" id="art-modal" hidden>
    <button class="art-modal__x" id="art-x" aria-label="Close">✕</button>
    <img class="art-modal__img" id="art-modal-img" alt="Album art" />
  </div>
  <audio id="audio" preload="none"></audio>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="data.js?v=63"></script>
  <script src="spotify.js?v=4"></script>
  <script src="app.js?v=68"></script>
</body>
</html>
