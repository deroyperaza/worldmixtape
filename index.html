<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>WORLD MIXTAPE — a century of local music, decade by decade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Anton&family=Permanent+Marker&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=105" />
<link rel="icon" type="image/svg+xml" href="WMT-Icon.svg" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#c6ff00" />
<meta name="description" content="A century of local music, decade by decade. Spin the globe through 50 countries and 7,700+ local songs — natives + diaspora, no imports." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://worldmixtape.com/" />
<meta property="og:title" content="WORLD MIXTAPE — a century of local music, decade by decade" />
<meta property="og:description" content="A century of local music, decade by decade — 50 countries, 7,700+ local songs from natives + diaspora. No imports." />
<meta property="og:image" content="https://worldmixtape.com/og-image.png?v=4" />
<meta property="og:image:width" content="2400" />
<meta property="og:image:height" content="1260" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="WORLD MIXTAPE — a century of local music, decade by decade" />
<meta name="twitter:description" content="A century of local music, decade by decade — 50 countries, 7,700+ local songs." />
<meta name="twitter:image" content="https://worldmixtape.com/og-image.png?v=4" />
</head>
<body>
  <!-- film-grain + halftone overlays -->
  <div class="grain" aria-hidden="true"></div>
  <svg class="noise-svg" aria-hidden="true"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#noise)"/></svg>

  <!-- top row: scrolling ticker -->
  <div class="ticker">
    <div class="ticker__scroll" aria-hidden="true"><div class="ticker__track" id="ticker"></div></div>
  </div>

  <header class="brand">
    <div class="brand__tape">
      <h1 class="brand__title"><img class="brand__logo" src="WMT-logo.svg?v=2" alt="World Mixtape" /></h1>
    </div>
    <p class="brand__sub">a century of local music,<br>decade by decade</p>
  </header>

  <!-- top-right controls: favorites + shuffle -->
  <div class="topctrls">
    <button class="faves-btn" id="faves-btn" aria-label="Favorites"><span class="faves-btn__h" aria-hidden="true">♥</span><i id="fav-count">0</i></button>
    <!-- spin the globe: random tracks, optionally filtered by country / era / genre -->
    <div class="shuffle-wrap" id="shuffle-wrap">
      <button class="shuffle" id="shuffle" aria-label="Shuffle">
        <span class="shuffle__ic" aria-hidden="true">🔀</span><span class="shuffle__tx">shuffle<br><b id="shuffle-scope">the world</b></span>
      </button>
      <button class="shuffle-filt" id="shuffle-filt" aria-label="Filter shuffle" aria-expanded="false">▾</button>
    </div>
  </div>
  <div class="shuffle-pop" id="shuffle-pop" hidden></div>

  <!-- the map = the navigation -->
  <main id="map-wrap" class="map-wrap">
    <svg id="map" role="img" aria-label="World map. Tap a highlighted country to hear its top tracks."></svg>
    <div class="clist" id="clist"></div>
  </main>
  <button class="view-toggle" id="view-toggle" aria-label="Toggle list view">☰ all countries</button>

  <!-- hover tooltip -->
  <div class="tip" id="tip" aria-hidden="true"></div>

  <!-- country panel / cassette J-card -->
  <aside class="panel" id="panel" aria-hidden="true">
    <button class="panel__close" id="panel-close" aria-label="Close">✕</button>
    <div class="panel__inner" id="panel-inner"></div>
  </aside>
  <div class="scrim" id="scrim" aria-hidden="true"></div>

  <!-- persistent player -->
  <footer class="player" id="player" aria-hidden="true">
    <img class="player__art" id="p-art" alt="" />
    <div class="player__meta">
      <div class="player__title" id="p-title">—</div>
      <div class="player__artist" id="p-artist">press play somewhere</div>
      <div class="player__bar"><i id="p-progress"></i></div>
    </div>
    <button id="p-fav" class="player__fav" aria-label="Save to favorites">♥</button>
    <div class="player__ctrls">
      <button id="p-prev" aria-label="Previous">⏮</button>
      <button id="p-play" class="is-big" aria-label="Play/Pause">▶</button>
      <button id="p-next" aria-label="Next">⏭</button>
    </div>
  </footer>

  <!-- album art lightbox / expanded now-playing card -->
  <div class="art-modal" id="art-modal" hidden>
    <button class="art-modal__x" id="art-x" aria-label="Close">✕</button>
    <div class="art-modal__card">
      <img class="art-modal__img" id="art-modal-img" alt="Album art" />
      <div class="art-modal__title" id="art-title">—</div>
      <div class="art-modal__meta" id="art-meta"></div>
      <div class="player__bar art-modal__bar"><i id="art-progress"></i></div>
      <div class="art-modal__ctrls">
        <button id="art-prev" aria-label="Previous">⏮</button>
        <button id="art-play" class="is-big" aria-label="Play/Pause">▶</button>
        <button id="art-next" aria-label="Next">⏭</button>
      </div>
      <button id="art-fav" class="art-modal__fav" aria-label="Save to favorites">♥</button>
    </div>
  </div>
  <audio id="audio" preload="none"></audio>
  <!-- hidden audio-only YouTube player (full-length playback for tracks that carry a ytId, e.g. Cuba pilot) -->
  <div id="yt-player" aria-hidden="true" style="position:fixed;left:-9999px;top:0;width:200px;height:200px;opacity:0;pointer-events:none"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="data.js?v=95"></script>
  <script src="app.js?v=103"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
